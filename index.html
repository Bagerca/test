<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bendy Dev Feed | Development</title>
    <link rel="stylesheet" href="style.css">
    <!-- Скрипт для мгновенного применения темы (защита от белой вспышки) -->
    <script>
        const savedTheme = localStorage.getItem('bendy-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="header-titles">
                <h1>Dev Feed</h1>
                <p>Bendy Development Updates</p>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </header>

    <main>
        <section class="feed-container">
            
            <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
            <div class="feed-controls">
                <input type="text" id="search-input" placeholder="🔍 Поиск по твитам..." aria-label="Поиск">
                <select id="author-filter" aria-label="Фильтр по автору">
                    <option value="all">Все разработчики</option>
                    <!-- Опции будут добавлены через JS -->
                </select>
            </div>

            <!-- ЛЕНТА -->
            <div id="feed-content" aria-live="polite">
                <!-- Skeleton Loaders (заглушки) -->
                <div class="post-card">
                    <div class="post-header">
                        <div class="skeleton skeleton-avatar"></div>
                        <div class="post-meta" style="width: 100%;">
                            <div class="skeleton skeleton-text" style="width: 40%; height: 1.1rem; margin-bottom: 6px;"></div>
                            <div class="skeleton skeleton-text" style="width: 25%; height: 0.85rem;"></div>
                        </div>
                    </div>
                    <div class="post-content">
                        <div class="skeleton skeleton-text" style="width: 100%; height: 1rem; margin-bottom: 6px;"></div>
                        <div class="skeleton skeleton-text" style="width: 85%; height: 1rem; margin-bottom: 6px;"></div>
                        <div class="skeleton skeleton-text" style="width: 60%; height: 1rem;"></div>
                        <div class="skeleton skeleton-media"></div>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- LIGHTBOX (Галерея) -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" aria-label="Закрыть">&times;</button>
        <img id="lightbox-img" src="" alt="Full image">
    </div>

    <!-- ШАБЛОН ПОСТА -->
    <template id="post-template">
        <article class="post-card">
            <header class="post-header">
                <img src="" alt="Avatar" class="post-avatar" loading="lazy">
                <div class="post-meta">
                    <h2 class="post-author-name"></h2>
                    <a class="post-author-handle" target="_blank" rel="noopener noreferrer"></a>
                </div>
                <span class="post-platform-badge"></span>
            </header>
            
            <div class="post-content">
                <p class="post-text"></p>
                <img src="" alt="Вложение поста" class="post-media" loading="lazy" style="display: none;" title="Нажмите для увеличения">
            </div>
            
            <footer class="post-footer">
                <time class="post-date" datetime=""></time>
            </footer>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>
